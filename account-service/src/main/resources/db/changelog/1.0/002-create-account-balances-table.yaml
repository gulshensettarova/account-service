databaseChangeLog:
  - changeSet:
      id: 002-create-account-balances-table
      author: dev
      changes:

        - createTable:
            tableName: account_balances
            remarks: Cached balances for fast account balance lookup
            columns:

              - column:
                  name: account_id
                  type: BIGINT
                  remarks: Reference to accounts table
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_account_balances
                    nullable: false

              - column:
                  name: available_balance
                  type: DECIMAL(19,2)
                  remarks: Available balance
                  defaultValueNumeric: 0

              - column:
                  name: blocked_balance
                  type: DECIMAL(19,2)
                  remarks: Blocked amount due to holds
                  defaultValueNumeric: 0

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: Last balance update
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            baseTableName: account_balances
            baseColumnNames: account_id
            constraintName: fk_account_balances_account
            referencedTableName: accounts
            referencedColumnNames: id
            onDelete: CASCADE